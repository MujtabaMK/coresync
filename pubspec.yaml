name: coresync
description: "A multi-module productivity app with TodoList, Password Manager, and Gym Tracker."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State Management
  flutter_bloc: ^9.1.0

  # Routing
  go_router: ^14.8.1

  # Firebase
  firebase_core: ^3.12.1
  firebase_auth: ^5.5.1
  cloud_firestore: ^5.6.5

  # Local Database
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Security
  flutter_secure_storage: ^9.2.4
  encrypt: ^5.0.3
  pointycastle: ^3.9.1

  # Notifications
  flutter_local_notifications: ^18.0.1
  timezone: ^0.10.0

  # UI / Utilities
  table_calendar: ^3.2.0
  url_launcher: ^6.3.1
  intl: ^0.20.2
  uuid: ^4.5.1
  fl_chart: ^0.70.2
  equatable: ^2.0.7
  flutter_timezone: ^5.0.1
  firebase_messaging: ^15.2.10

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.13
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
